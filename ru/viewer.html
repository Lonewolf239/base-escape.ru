<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="/styles/background.css">
		<link rel="stylesheet" href="/styles/lonewolf239.css">
	    <link rel="stylesheet" href="/styles/styles.css">
	    <link rel="stylesheet" href="/styles/viewer.css">
	    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
	    <title>Lonewolf239 | Просмотр кода</title>
	    <link rel="icon" href="/images/icon.svg" type="image/svg+xml">
	</head>
	<body>
	    <nav></nav>
	    <div id="content-wrapper">
	        <h1 id="lonewolf239">Lonewolf239</h1>
	        <div class="space-dust"></div>
	        <div class="retro-sun"></div>
	        <div class="bg-grid"></div>
	        <div class="ide-container">
	            <div class="sidebar">
	                <div class="sidebar-header">
	                    <h2 id="repo-name">Загрузка...</h2>
	                </div>
					<div class="license-info" id="license-info" style="display: none;">
						<div class="license-icon">⚖️</div>
						<div class="license-text">
							<span class="license-label">Лицензия</span>
							<span class="license-name" id="license-name"></span>
						</div>
						<div class="license-open">📄</div>
					</div>
	                <div class="file-tree" id="file-tree">
	                    <div class="loader">Загрузка содержимого...</div>
	                </div>
	            </div>
	            <div class="main-content">
	                <div class="code-viewer" id="code-viewer">
	                    <div class="code-header">
	                        <span id="current-file">Файл не выбран</span>
	                    </div>
	                    <pre><code id="code-content" class="language-plaintext"></code></pre>
	                </div>
	            </div>
	        </div>
	    </div>
	    <footer></footer>
	    <script src="/scripts/base-scripts.js"></script>
	    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
	    <script src="/scripts/viewer.js"></script>
	</body>
</html>
